{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-4">
    <h2><i class="fa-solid fa-utensils text-success me-2"></i>Manage Food Menu</h2>
    <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary mt-1">Back to Dashboard</a>
</div>
<div class="card p-4 shadow-sm border-top border-success border-4">
    <form method="POST">
        {% csrf_token %}
        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light"><tr><th style="width: 15%;">Day</th><th>Breakfast</th><th>Lunch</th><th>Dinner</th></tr></thead>
                <tbody>
                    {% for m in menus %}
                    <tr>
                        <td class="fw-bold">{{ m.day }}</td>
                        <td><input type="text" name="breakfast_{{ m.day }}" class="form-control" value="{{ m.breakfast }}" required></td>
                        <td><input type="text" name="lunch_{{ m.day }}" class="form-control" value="{{ m.lunch }}" required></td>
                        <td><input type="text" name="dinner_{{ m.day }}" class="form-control" value="{{ m.dinner }}" required></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-end mt-3">
            <button type="submit" class="btn btn-success btn-lg fw-bold"><i class="fa-solid fa-save me-1"></i> Save Full Menu</button>
        </div>
    </form>
</div>
{% endblock %}
