{% extends 'base.html' %}
{% block content %}
<div class="row mb-4">
    <div class="col-12 text-center">
        <h2 class="fw-bold mb-1"><i class="fa-solid fa-vote-yea text-primary me-2"></i>Raise a Complaint Poll</h2>
        <p class="text-muted">Create a democratic poll for other tenants to vote on.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 border-top border-primary border-4">
            <div class="card-body p-4">
                {% if warning %}
                <div class="alert alert-warning border-0 shadow-sm d-flex align-items-center">
                    <i class="fa-solid fa-triangle-exclamation fs-4 me-3"></i>
                    <div>
                        <strong>Warning!</strong> {{ warning }}
                    </div>
                </div>
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    {% if warning %}
                        <input type="hidden" name="ignore_warning" value="true">
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Poll Title</label>
                        <input type="text" name="complaint_title" class="form-control" placeholder="e.g. Broken elevator in Block B" value="{{ form_data.complaint_title|default:'' }}" required maxlength="100">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category</label>
                        <select name="complaint_category" class="form-select" required>
                            <option value="">-- Select Category --</option>
                            {% for val, display in poll_categories %}
                            <option value="{{ val }}" {% if form_data.complaint_category == val %}selected{% endif %}>{{ display }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea name="complaint_description" class="form-control" rows="4" placeholder="Detail the issue being raised..." required minlength="20" maxlength="500">{{ form_data.complaint_description|default:'' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Poll Question</label>
                        <input type="text" name="poll_question" class="form-control" placeholder="e.g. Do you agree the elevator needs immediate fixing?" value="{{ form_data.poll_question|default:'' }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Voting Duration (Days)</label>
                        <select name="poll_duration_days" class="form-select" required>
                            {% for val, display in duration_choices %}
                            <option value="{{ val }}" {% if form_data.poll_duration_days|stringformat:"i" == val|stringformat:"i" %}selected{% endif %}>{{ display }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'tenant_dashboard' %}" class="btn btn-outline-secondary px-4 fw-bold">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4 fw-bold">{% if warning %}Confirm and Raise{% else %}Raise Poll{% endif %}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
