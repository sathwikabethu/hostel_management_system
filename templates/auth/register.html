{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm border-top border-success border-4 mb-5">
            <div class="text-center mb-4">
                <div class="display-4 text-success mb-2"><i class="fa-solid fa-id-card"></i></div>
                <h3 class="fw-bold">Tenant Registration</h3>
                <p class="text-muted">Create your hostel management account</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button class="btn btn-success btn-lg w-100 mt-3" type="submit"><i class="fa-solid fa-user-plus me-1"></i> Register Account</button>
            </form>
            <p class="text-center mt-3 mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </div>
    </div>
</div>
<style>
    /* basic auto formatting for django forms */
    form input, form select, form textarea {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
    }
</style>
{% endblock %}
