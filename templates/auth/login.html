{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-top border-primary border-4">
            <div class="text-center mb-4">
                <div class="display-3 text-primary mb-2"><i class="fa-solid fa-user-lock"></i></div>
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted">Login to access your dashboard</p>
            </div>
            <form method="POST" autocomplete="off">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" name="username" id="username" class="form-control" autocomplete="off" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-bold" type="submit">Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i></button>
            </form>
            <p class="text-center mt-4 mb-0">Don't have an account? <br><a href="{% url 'register' %}" class="fw-bold text-decoration-none">Register as Tenant</a></p>
        </div>
    </div>
</div>
{% endblock %}
